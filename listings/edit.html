<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Update your auction details on Student Auction House. Edit your item description, add new photos, or adjust your tags to attract more bidders and get the best price for your items."
    />
    <title>Student Auction House | Edit Listing</title>
    <script
      src="https://kit.fontawesome.com/bfed71705b.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/scripts/pages/login.mjs" type="module"></script>
  </head>

  <body class="grid min-h-screen grid-rows-[auto_1fr_auto] bg-bg">
    <header></header>
    <main></main>
    <footer class="bg-white p-4 shadow-inner">
      <div class="container mx-auto space-y-4 text-center">
        <a href="/index.html">
          <img
            src="/assets/studentauctionhouselogo.png"
            alt="Student Auction House logo"
            class="m-auto h-auto w-28 pb-4 hover:opacity-80 transition-opacity"
          />
        </a>

        <div
          class="flex justify-center font-semibold font-sans sm:text-sm md:text-md space-x-6"
        >
          <a
            href="/contact/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Contact</a
          >
          <a
            href="/about/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >About</a
          >
          <a
            href="/terms/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Terms</a
          >
          <a
            href="/privacy/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Privacy</a
          >
        </div>
        <div class="flex justify-center space-x-5 text-xl text-primary">
          <a href="https://www.facebook.com" aria-label="Link to Facebook">
            <i
              class="fa-brands fa-square-facebook hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.instagram.com" aria-label="Link to Instagram">
            <i
              class="fa-brands fa-square-instagram hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.youtube.com" aria-label="Link to YouTube">
            <i
              class="fa-brands fa-square-youtube hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.tiktok.com" aria-label="Link to TikTok">
            <i
              class="fa-brands fa-tiktok hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://x.com" aria-label="Link to x (formerly Twitter)">
            <i
              class="fa-brands fa-square-x-twitter hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
        </div>
        <p class="text-sm text-primary">
          Copyright &copy; StudentAuctionHouseLtd 2026
        </p>
      </div>
    </footer>
  </body>
</html>
