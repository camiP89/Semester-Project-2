<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Manage your Student Auction House profile. View your current credit balance, track your active bids, and manage your listings. Update your avatar and keep your account details up to date."
    />
    <title>Student Auction House | Profile</title>
    <script
      src="https://kit.fontawesome.com/bfed71705b.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/scripts/pages/profilePage.mjs" type="module"></script>
  </head>

  <body class="grid min-h-screen grid-rows-[auto_1fr_auto] bg-bg">
    <header class="bg-white shadow-lg sticky top-0 z-50">
      <nav
        class="container mx-auto px-4 py-2 flex items-center justify-between"
      >
        <a
          href="/index.html"
          class="w-36 hover:opacity-80 transition-opacity shrink-0"
        >
          <img src="/assets/studentauctionhouselogo.png" alt="Logo" />
        </a>

        <div
          id="user-status-bar"
          class="hidden flex-col items-start gap-1 sm:flex-row sm:items-center"
        >
          <p
            id="welcome-text"
            class="text-xs font-medium italic text-primary"
          ></p>

          <div class="flex items-center gap-1">
            <img src="/assets/sp2-coin.png" class="w-4 h-4" alt="credits" />
            <span id="user-credits" class="text-xs font-bold text-primary"
              >0</span
            >
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="hidden md:flex space-x-6 items-center">
            <a
              href="/index.html"
              class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Home</a
            >
            <a
              href="/about/index.html"
              class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >About</a
            >

            <div id="logged-in-nav" class="hidden items-center space-x-6">
              <a
                href="/listings/index.html"
                class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
                >Listings</a
              >
              <a
                href="/profile/index.html"
                class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
                >Profile</a
              >
              <button
                id="logout-button"
                class="bg-primary text-white px-6 py-1.5 rounded-full text-sm font-semibold"
              >
                Log Out
              </button>
            </div>

            <div id="logged-out-nav" class="flex items-center">
              <a
                href="/account/login.html"
                class="bg-primary text-white px-6 py-1.5 rounded-full text-sm font-semibold"
                >Sign In</a
              >
            </div>
          </div>

          <button id="menu-btn" class="p-2 md:hidden block">
            <i class="fa-solid fa-bars text-2xl text-primary"></i>
          </button>
        </div>
      </nav>

      <div
        id="mobile-menu"
        class="hidden md:hidden absolute top-full left-0 w-full bg-white shadow-lg py-8 z-50"
      >
        <div class="flex flex-col items-center font-sans gap-6">
          <a
            href="/index.html"
            class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Home</a
          >
          <a
            href="/about/index.html"
            class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >About</a
          >

          <div
            id="mobile-logged-in-nav"
            class="hidden flex-col items-center gap-6 w-full"
          >
            <a
              href="/listings/index.html"
              class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Listings</a
            >
            <a
              href="/profile/index.html"
              class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Profile</a
            >
            <button
              id="mobile-logout-button"
              class="bg-primary text-white px-8 py-2 rounded-full text-md"
            >
              Log Out
            </button>
          </div>

          <div
            id="mobile-logged-out-nav"
            class="flex flex-col items-center gap-6 w-full"
          >
            <a
              href="/account/login.html"
              class="text-md bg-primary text-white px-8 py-2 rounded-full"
              >Sign In</a
            >
          </div>
        </div>
      </div>
    </header>
    <main class="container mx-auto px-4 max-w-7xl">
      <section
        id="profile-info"
        class="my-8 p-6 bg-white rounded-2xl shadow-lg border-2 border-border"
      >
        <div class="flex flex-col md:flex-row items-center gap-6">
          <img
            id="profile-avatar"
            src="/assets/hat-icon.png"
            class="w-32 h-32 rounded-full object-cover border-4 border-primary"
            alt="Profile Picture"
          />
          <div class="text-center md:text-left grow">
            <h1 id="profile-name" class="text-2xl font-bold text-text">
              Loading...
            </h1>
            <p id="profile-bio" class="text-text/70 mt-2">Bio goes here...</p>
            <div class="flex gap-4 mt-4 justify-center md:justify-start">
              <span
                id="credits-count"
                class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-bold"
                >Credits: 0</span
              >
              <span
                id="wins-count"
                class="bg-accent/10 text-accent px-3 py-1 rounded-full text-sm font-bold"
                >Wins: 0</span
              >
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <div
              id="edit-profile-section"
              class="hidden my-6 p-4 bg-gray-50 rounded-xl border-2 border-dashed border-detail/30"
            >
              <form id="update-profile-form" class="flex flex-col gap-4">
                <div>
                  <label class="block text-sm font-bold mb-1"
                    >New Avatar URL</label
                  >
                  <input
                    type="url"
                    name="avatarUrl"
                    class="w-full p-2 rounded border border-border"
                  />
                </div>
                <div>
                  <label class="block text-sm font-bold mb-1">Bio</label>
                  <textarea
                    name="bio"
                    class="w-full p-2 rounded border border-border"
                    rows="3"
                  ></textarea>
                </div>
                <div class="flex gap-2">
                  <button
                    type="submit"
                    class="bg-primary text-white px-4 py-2 rounded"
                  >
                    Save Changes
                  </button>
                  <button
                    type="button"
                    id="close-edit"
                    class="bg-gray-300 px-4 py-2 rounded"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            </div>
            <button
              id="edit-profile-btn"
              class="bg-detail/10 text-detail px-4 py-2 rounded-lg font-bold hover:bg-detail/20"
            >
              Edit Profile
            </button>
            <a
              href="/listings/create.html"
              class="bg-primary text-white px-4 py-2 rounded-lg text-center"
              >Create Listing</a
            >
          </div>
        </div>
      </section>

      <h2 class="text-xl font-bold mb-4">My Listings</h2>
      <template id="listing-card-template">
        <article
          class="group relative overflow-hidden rounded-2xl border-2 border-border bg-white shadow-lg flex flex-col h-full"
        >
          <div class="relative h-60 w-full overflow-hidden">
            <div
              class="js-image h-full bg-cover bg-center transition-transform duration-500 group-hover:scale-110"
            ></div>
            <div
              class="absolute top-3 left-3 text-xs text-white bg-border/80 px-2 py-1 rounded-lg backdrop-blur-md"
            >
              <p class="js-bid-count">0 bids</p>
            </div>
            <div
              class="absolute bottom-3 left-3 text-xs text-white bg-border/80 px-2 py-1 rounded-lg backdrop-blur-md"
            >
              <p class="js-ends-at">Ends: Mar 20,2026</p>
            </div>
          </div>
          <div class="p-4 flex flex-col grow">
            <h3
              class="js-title font-sans text-lg line-clamp-1 font-semibold text-text"
            >
              Listing Title
            </h3>
            <div class="flex flex-col gap-0.5 mt-2">
              <div class="flex- items-center gap-1.5">
                <span class="text-sm font-medium text-text">By:</span>
                <span class="js-author text-sm font-medium text-detail"
                  >Author Name</span
                >
              </div>
              <div class="flex items-center gap-1.5">
                <span class="text-sm font-medium text-text">Created:</span>
                <span class="js-date text-sm font-medium text-detail"
                  >Feb 5, 2026</span
                >
              </div>
            </div>

            <p
              class="js-description mt-2 line-clamp-2 font-sans text-sm text-text grow"
            >
              Description of listing item goes here.
            </p>
            <div class="flex items-center gap-2 mt-3">
              <span class="text-sm font-medium text-text">Highest Bid:</span>
              <span class="js-highest-bid text-md text-accent font-bold"
                >No bids yet</span
              >
            </div>
            <div class="js-tag-container flex flex-wrap gap-1 mt-2"></div>
            <div class="js-owner-controls hidden gap-2 mt-2">
              <button
                class="js-edit-btn bg-detail text-white px-3 py-1 rounded text-xs font-semibold flex-1"
              >
                Edit
              </button>
              <button
                class="js-delete-btn bg-red-500 text-white px-3 py-1 rounded text-xs font-semibold flex-1"
              >
                Delete
              </button>
            </div>
            <div class="mt-4 pt-2 border-t border-border">
              <a
                href="/listings/listing-detail.html"
                class="js-link block rounded-lg border-2 border-border bg-primary w-full py-2 text-center font-medium text-white hover:bg-detail focus:ring-2 focus:ring-detail transition-colors"
                >View Details</a
              >
            </div>
          </div>
        </article>
      </template>

      <div
        id="listings-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"
      ></div>
    </main>
    <footer class="bg-white p-4 shadow-inner">
      <div class="container mx-auto space-y-4 text-center">
        <a href="/index.html">
          <img
            src="/assets/studentauctionhouselogo.png"
            alt="Student Auction House logo"
            class="m-auto h-auto w-28 pb-4 hover:opacity-80 transition-opacity"
          />
        </a>

        <div
          class="flex justify-center font-semibold font-sans sm:text-sm md:text-md space-x-6"
        >
          <a
            href="/contact/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Contact</a
          >
          <a
            href="/about/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >About</a
          >
          <a
            href="/terms/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Terms</a
          >
          <a
            href="/privacy/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Privacy</a
          >
        </div>
        <div class="flex justify-center space-x-5 text-xl text-primary">
          <a href="https://www.facebook.com" aria-label="Link to Facebook">
            <i
              class="fa-brands fa-square-facebook hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.instagram.com" aria-label="Link to Instagram">
            <i
              class="fa-brands fa-square-instagram hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.youtube.com" aria-label="Link to YouTube">
            <i
              class="fa-brands fa-square-youtube hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.tiktok.com" aria-label="Link to TikTok">
            <i
              class="fa-brands fa-tiktok hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://x.com" aria-label="Link to x (formerly Twitter)">
            <i
              class="fa-brands fa-square-x-twitter hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
        </div>
        <p class="text-sm text-primary">
          Copyright &copy; StudentAuctionHouseLtd 2026
        </p>
      </div>
    </footer>
  </body>
</html>
