<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Join the Student Auction House! Bid on clothes, electronics and more. Register today to get 1,000 free credits and start winning exclusive student deals."
    />
    <title>Student Auction House | Register</title>
    <script
      src="https://kit.fontawesome.com/bfed71705b.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/scripts/pages/register.mjs" type="module"></script>
  </head>

  <body class="grid min-h-screen grid-rows-[auto_1fr_auto] bg-bg">
    <header class="bg-white shadow-lg sticky top-0 z-50">
      <nav
        class="container mx-auto px-4 py-2 flex items-center justify-between"
      >
        <a
          href="/index.html"
          class="w-36 hover:opacity-80 transition-opacity shrink-0"
        >
          <img src="/assets/studentauctionhouselogo.png" alt="Logo" />
        </a>

        <div
          id="user-status-bar"
          class="hidden flex-col items-start gap-1 sm:flex-row sm:items-center"
        >
          <p
            id="welcome-text"
            class="text-xs font-medium italic text-primary"
          ></p>

          <div class="flex items-center gap-1">
            <img src="/assets/sp2-coin.png" class="w-4 h-4" alt="credits" />
            <span id="user-credits" class="text-xs font-bold text-primary"
              >0</span
            >
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="hidden md:flex space-x-6 items-center">
            <a
              href="/index.html"
              class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Home</a
            >
            <a
              href="/about/index.html"
              class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >About</a
            >

            <div id="logged-in-nav" class="hidden items-center space-x-6">
              <a
                href="/listings/index.html"
                class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
                >Listings</a
              >
              <a
                href="/profile/index.html"
                class="font-medium hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
                >Profile</a
              >
              <button
                id="logout-button"
                class="bg-primary text-white px-6 py-1.5 rounded-full text-sm font-semibold"
              >
                Log Out
              </button>
            </div>

            <div id="logged-out-nav" class="flex items-center">
              <a
                href="/account/login.html"
                class="bg-primary text-white px-6 py-1.5 rounded-full text-sm font-semibold"
                >Sign In</a
              >
            </div>
          </div>

          <button id="menu-btn" class="p-2 md:hidden block">
            <i class="fa-solid fa-bars text-2xl text-primary"></i>
          </button>
        </div>
      </nav>

      <div
        id="mobile-menu"
        class="hidden md:hidden absolute top-full left-0 w-full bg-white shadow-lg py-8 z-50"
      >
        <div class="flex flex-col items-center font-sans gap-6">
          <a
            href="/index.html"
            class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Home</a
          >
          <a
            href="/about/index.html"
            class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >About</a
          >

          <div
            id="mobile-logged-in-nav"
            class="hidden flex-col items-center gap-6 w-full"
          >
            <a
              href="/listings/index.html"
              class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Listings</a
            >
            <a
              href="/profile/index.html"
              class="text-md font-semibold hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
              >Profile</a
            >
            <button
              id="mobile-logout-button"
              class="bg-primary text-white px-8 py-2 rounded-full text-md"
            >
              Log Out
            </button>
          </div>

          <div
            id="mobile-logged-out-nav"
            class="flex flex-col items-center gap-6 w-full"
          >
            <a
              href="/account/login.html"
              class="text-md bg-primary text-white px-8 py-2 rounded-full"
              >Sign In</a
            >
          </div>
        </div>
      </div>
    </header>
    <main
      class="container mx-auto flex flex-col items-center justify-center px-4 py-12"
    >
      <h1
        class="mb-8 text-center font-sans sm:text-xl md:text-2xl tracking-wide font-bold text-text"
      >
        Welcome to
        <span class="text-primary sm:text-xl md:text-2xl font-extrabold"
          >Student Auction House</span
        >
      </h1>
      <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
        <form id="form-container" class="space-y-5">
          <div>
            <label
              class="mb-1 block text-sm font-semibold text-text/80"
              for="email"
              >Name</label
            >
            <input
              class="mb-1 w-full rounded-lg border border-border/30 px-4 py-2 text-xs focus:ring-2 focus:ring-detail focus:outline-none"
              type="text"
              id="name"
              placeholder="Enter name"
              required
            />
          </div>
          <div>
            <label
              class="mb-1 block text-sm font-semibold text-text/80"
              for="email"
              >Student Email</label
            >
            <div
              class="flex items-center overflow-hidden rounded-lg border border-border/30 focus-within:ring-2 focus-within:ring-detail"
            >
              <input
                class="w-full bg-transparent px-4 py-2 text-xs focus:outline-none"
                type="text"
                id="username"
                name="username"
                placeholder="Username"
                required
              />
              <span
                class="bg-text/20 px-5 py-2 text-xs font-medium text-text border-l border-border/30 select-none"
                >@stud.noroff.no</span
              >
            </div>
          </div>
          <div>
            <label
              class="mb-1 block text-sm font-semibold text-text/80"
              for="password"
              >Password</label
            >
            <input
              class="w-full rounded-lg border border-border/30 px-4 py-2 text-xs focus:ring-2 focus:ring-detail focus:outline-none"
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              required
            />
          </div>
          <div>
            <label
              class="mb-1 block text-sm font-semibold text-text/80"
              for="password"
              >Avatar URL</label
            >
            <input
              class="w-full rounded-lg border border-border/30 px-4 py-2 text-xs focus:ring-2 focus:ring-detail focus:outline-none"
              type="url"
              id="avatarUrl"
              placeholder="Enter a public image URL"
            />
          </div>
          <button
            class="text-md w-full rounded-lg bg-coin py-2 font-semibold text-white bg-primary shadow-md transition hover:bg-detail hover:text-text focus:ring-2 focus:ring-detail focus:outline-detail active:bg-detail disabled:opacity-50"
            type="submit"
            name="action"
            value="register"
          >
            Register
          </button>
        </form>
        <p class="mt-6 text-center text-xs text-text/70">
          Already have an account?
          <a
            href="/account/login.html"
            class="font-bold text-detail hover:underline"
            >Log in here</a
          >
        </p>
      </div>
    </main>

    <footer class="bg-white p-4 shadow-inner">
      <div class="container mx-auto space-y-4 text-center">
        <a href="/index.html">
          <img
            src="/assets/studentauctionhouselogo.png"
            alt="Student Auction House logo"
            class="m-auto h-auto w-28 pb-4 hover:opacity-80 transition-opacity"
          />
        </a>

        <div
          class="flex justify-center font-semibold font-sans sm:text-sm md:text-md space-x-6"
        >
          <a
            href="/contact/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Contact</a
          >
          <a
            href="/about/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >About</a
          >
          <a
            href="/terms/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Terms</a
          >
          <a
            href="/privacy/index.html"
            class="hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all text-primary"
            >Privacy</a
          >
        </div>
        <div class="flex justify-center space-x-5 text-xl text-primary">
          <a href="https://www.facebook.com" aria-label="Link to Facebook">
            <i
              class="fa-brands fa-square-facebook hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.instagram.com" aria-label="Link to Instagram">
            <i
              class="fa-brands fa-square-instagram hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.youtube.com" aria-label="Link to YouTube">
            <i
              class="fa-brands fa-square-youtube hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://www.tiktok.com" aria-label="Link to TikTok">
            <i
              class="fa-brands fa-tiktok hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
          <a href="https://x.com" aria-label="Link to x (formerly Twitter)">
            <i
              class="fa-brands fa-square-x-twitter hover:text-detail active:text-detail hover:underline hover:decoration-detail underline-offset-4 transition-all"
            ></i>
          </a>
        </div>
        <p class="text-sm text-primary">
          Copyright &copy; StudentAuctionHouseLtd 2026
        </p>
      </div>
    </footer>
  </body>
</html>
